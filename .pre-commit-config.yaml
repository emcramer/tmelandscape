repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        # 10 MB threshold: comfortably allows the literature PDFs (~7 MB) and uv.lock,
        # while still catching accidental data/output dumps that belong in DVC/Zenodo.
        args: ["--maxkb=10000"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--ignore-words-list=ND,nd,coo"]
        exclude: "^(docs/literature/|.*\\.lock)"
