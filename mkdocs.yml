site_name: tmelandscape
site_description: Generate tumor microenvironment state landscapes from agent-based model simulation ensembles.
site_url: https://emcramer.github.io/tmelandscape/
repo_url: https://github.com/emcramer/tmelandscape
repo_name: emcramer/tmelandscape
edit_uri: edit/main/docs/

# The decision log under docs/development/decisions/ is a project-internal
# artefact for orchestrators and agents (see its README). Entries link
# freely to repo-root files (tasks/, CHANGELOG.md, ADRs) and aren't
# subject to the published-docs link-completeness check. Exclude from
# the rendered site.
exclude_docs: |
  development/decisions/*

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
      - concepts/sampling.md
      - concepts/summarize.md
      - concepts/normalize.md
      - concepts/embedding.md
      - concepts/cluster.md
      - concepts/viz.md
  - API reference: api/index.md
  - Tutorials: tutorials/index.md
  - MCP for agents: mcp/index.md
  - Development:
      - Roadmap: development/ROADMAP.md
      - Status: development/STATUS.md
      - Handoff guide: development/HANDOFF.md
      - ADRs: adr/README.md
